<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KLM Supermarket</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #2e8b57;
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        .section {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .section h2 {
            color: #2e8b57;
        }

        ul {
            list-style-type: square;
        }

        li {
            margin: 8px 0;
        }

        footer {
            background-color: #2e8b57;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>KLM Supermarket</h1>
        <p>Your daily needs in one place</p>
    </header>

    <div class="container">

        <div class="section">
            <h2>Fruits & Vegetables</h2>
            <ul>
                <li>Apples</li>
                <li>Bananas</li>
                <li>Carrots</li>
                <li>Tomatoes</li>
                <li>Spinach</li>
            </ul>
        </div>

        <div class="section">
            <h2>Dairy Products</h2>
            <ul>
                <li>Milk</li>
                <li>Butter</li>
                <li>Cheese</li>
                <li>Yogurt</li>
                <li>Paneer</li>
            </ul>
        </div>

    </div>

    <footer>
        <p>© 2026 KLM Supermarket</p>
    </footer>

</body>
  </html>
